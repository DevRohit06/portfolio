<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5865F2"/>
      <stop offset="100%" style="stop-color:#7289DA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="80" y="80" width="1040" height="470" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="80" y="80" width="1040" height="40" rx="12" fill="#161b22"/>
  <rect x="80" y="108" width="1040" height="12" fill="#161b22"/>
  <!-- Window dots -->
  <circle cx="110" cy="100" r="7" fill="#ff5f57"/>
  <circle cx="134" cy="100" r="7" fill="#febc2e"/>
  <circle cx="158" cy="100" r="7" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="600" y="105" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">discli</text>

  <!-- Terminal content -->
  <!-- Line 1: command -->
  <text x="110" y="160" font-family="monospace" font-size="18" fill="#7ee787">$</text>
  <text x="130" y="160" font-family="monospace" font-size="18" fill="#e6edf3"> discli message send #general "Hello world!"</text>

  <!-- Line 2: success -->
  <text x="110" y="192" font-family="monospace" font-size="18" fill="#8b949e">✓ Message sent (id: 1234567890)</text>

  <!-- Line 3: empty -->

  <!-- Line 4: command -->
  <text x="110" y="240" font-family="monospace" font-size="18" fill="#7ee787">$</text>
  <text x="130" y="240" font-family="monospace" font-size="18" fill="#e6edf3"> discli --json listen --events messages</text>

  <!-- Line 5: JSON output -->
  <text x="110" y="272" font-family="monospace" font-size="16" fill="#79c0ff">{"event": "message", "author": "alice", "content": "hello"}</text>

  <!-- Line 6: empty -->

  <!-- Line 7: command -->
  <text x="110" y="320" font-family="monospace" font-size="18" fill="#7ee787">$</text>
  <text x="130" y="320" font-family="monospace" font-size="18" fill="#e6edf3"> discli permission set chat</text>

  <!-- Line 8: success -->
  <text x="110" y="352" font-family="monospace" font-size="18" fill="#8b949e">✓ Permission profile set to: chat</text>

  <!-- Line 9: empty -->

  <!-- Line 10: command -->
  <text x="110" y="400" font-family="monospace" font-size="18" fill="#7ee787">$</text>
  <text x="130" y="400" font-family="monospace" font-size="18" fill="#e6edf3"> discli server list</text>

  <!-- Line 11: output -->
  <text x="110" y="432" font-family="monospace" font-size="16" fill="#79c0ff">  1. My Server (12 channels, 342 members)</text>
  <text x="110" y="458" font-family="monospace" font-size="16" fill="#79c0ff">  2. Dev Hub   (8 channels, 89 members)</text>

  <!-- Cursor -->
  <rect x="110" y="480" width="10" height="20" fill="#5865F2">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Discord accent bar at bottom -->
  <rect x="80" y="540" width="1040" height="4" fill="url(#accent)" rx="2"/>

  <!-- Logo text bottom right -->
  <text x="1080" y="590" font-family="monospace" font-size="32" font-weight="bold" fill="url(#accent)" text-anchor="end">discli</text>
  <text x="1080" y="612" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="end">Discord CLI for AI agents</text>
</svg>